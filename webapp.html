<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Настройки Living Tales</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --bg-dark: #0f0f13; --card-bg: rgba(30, 30, 40, 0.6); --text-main: #e2e2e5; --accent-glow: #a855f7; --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%); }
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    .container { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
    h2 { font-size: 18px; margin-bottom: 15px; color: var(--accent-glow); }
    .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .chips-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip { padding: 8px 14px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .chip.active { background: var(--primary-gradient); color: white; border-color: transparent; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    textarea { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; color: white; min-height: 100px; box-sizing: border-box; }
    .save-btn-container { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 100; }
    .main-btn { width: 100%; padding: 16px; border-radius: 20px; border: none; background: var(--primary-gradient); color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>⚙️ Настройки игры</h2>
      <label>Инициатива</label>
      <div class="chips-container" id="initiative-group">
        <div class="chip" role="button" tabindex="0" data-type="initiative" data-val="passive">🌙 Пассивная</div>
        <div class="chip active" role="button" tabindex="0" data-type="initiative" data-val="balanced">⚖️ Баланс</div>
        <div class="chip" role="button" tabindex="0" data-type="initiative" data-val="active">🔥 Активная</div>
        <div class="chip" role="button" tabindex="0" data-type="initiative" data-val="dominant">👑 Доминант</div>
      </div>
      <label>Длина ответов</label>
      <div class="chips-container" id="length-group">
        <div class="chip" role="button" tabindex="0" data-type="length" data-val="short">💬 Короткие</div>
        <div class="chip active" role="button" tabindex="0" data-type="length" data-val="medium">📝 Средние</div>
        <div class="chip" role="button" tabindex="0" data-type="length" data-val="long">📜 Длинные</div>
      </div>
      <label>Темп</label>
      <div class="chips-container" id="pacing-group">
        <div class="chip" role="button" tabindex="0" data-type="pacing" data-val="slow">🐢 Медленный</div>
        <div class="chip active" role="button" tabindex="0" data-type="pacing" data-val="normal">🚶 Обычный</div>
        <div class="chip" role="button" tabindex="0" data-type="pacing" data-val="fast">⚡ Быстрый</div>
      </div>
      <label>Режим NPC</label>
      <div class="chips-container" id="npc-group">
        <div class="chip" role="button" tabindex="0" data-type="npc" data-val="none">🚫 Выкл</div>
        <div class="chip active" role="button" tabindex="0" data-type="npc" data-val="auto">🤖 Авто</div>
        <div class="chip" role="button" tabindex="0" data-type="npc" data-val="manual">👤 Вручную</div>
      </div>
      <label>Сеттинг</label>
      <textarea id="setting-text" placeholder="Опиши мир, эпоху, правила..."></textarea>
    </div>
  </div>
  <div class="save-btn-container">
    <button class="main-btn" type="button" id="save-btn">💾 Сохранить настройки</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.ready();

      const settings = {
        initiative: 'balanced',
        length: 'medium',
        pacing: 'normal',
        npc: 'none',
        setting: ''
      };

      // Делегирование кликов (стабильно работает на iOS)
      document.querySelectorAll('.chips-container').forEach(container => {
        const type = container.id.replace('-group', '');
        container.addEventListener('click', (e) => {
          const chip = e.target.closest('.chip');
          if (!chip) return;
          e.preventDefault();
          
          container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          settings[type] = chip.dataset.val;
        });
      });

      // Синхронизация поля сеттинга
      const settingInput = document.getElementById('setting-text');
      settingInput.addEventListener('input', () => { settings.setting = settingInput.value; });

      // Сохранение
      document.getElementById('save-btn').addEventListener('click', () => {
        if (tg && tg.sendData) {
          tg.sendData(JSON.stringify(settings));
        } else {
          alert('Ошибка соединения с Telegram.');
        }
      });
    });
  </script>
</body>
</html>
