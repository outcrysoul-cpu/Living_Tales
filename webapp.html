<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.3);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        .background-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 20px;
            padding-bottom: calc(100px + var(--safe-area-bottom));
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            margin-top: 15px;
        }
        
        label:first-child {
            margin-top: 0;
        }

        .chips-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
            padding-bottom: 5px;
        }

        .chip {
            flex: 0 0 auto;
            min-width: 65px;
            padding: 10px 8px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }

        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Добавляем активное состояние для тач-устройств */
        .chip:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .chip-icon {
            font-size: 18px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
            min-height: 100px;
            -webkit-appearance: none;
            appearance: none;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .save-btn-container {
            position: fixed;
            bottom: calc(20px + var(--safe-area-bottom));
            left: 20px;
            right: 20px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
        }

        .main-btn:active {
            transform: scale(0.97);
        }

        .main-btn.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Улучшенная поддержка тач-экранов */
        @media (hover: none) and (pointer: coarse) {
            .chip, .main-btn {
                cursor: default;
            }
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container">
        <div class="card">
            <h2>🎭 Поведение персонажа</h2>
            <label>Инициатива в игре</label>
            <div class="chips-container" id="initiative-group">
                <div class="chip" data-val="passive"><span class="chip-icon">🌙</span>Пассивный</div>
                <div class="chip" data-val="balanced"><span class="chip-icon">⚖️</span>Баланс</div>
                <div class="chip" data-val="active"><span class="chip-icon">🔥</span>Активный</div>
                <div class="chip" data-val="dominant"><span class="chip-icon">👑</span>Доминант</div>
            </div>
            <label>Длина ответов</label>
            <div class="chips-container" id="length-group">
                <div class="chip" data-val="short"><span class="chip-icon">💬</span>Короткие</div>
                <div class="chip" data-val="medium"><span class="chip-icon">📝</span>Средние</div>
                <div class="chip" data-val="long"><span class="chip-icon">📜</span>Длинные</div>
            </div>
        </div>

        <div class="card">
            <h2>🌍 Мир и Сюжет</h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" placeholder="Например: Киберпанк 2077, Неон, Дождь... или Фэнтези, Магия, Драконы..."></textarea>
            <label>Темп событий</label>
            <div class="chips-container" id="pacing-group">
                <div class="chip" data-val="slow"><span class="chip-icon">🐢</span>Спокойный</div>
                <div class="chip" data-val="normal"><span class="chip-icon">🚶</span>Нормальный</div>
                <div class="chip" data-val="fast"><span class="chip-icon">⚡</span>Экшен</div>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ Дополнительно</h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container" id="npc-group">
                <div class="chip" data-val="none"><span class="chip-icon">🚫</span>Запрещены</div>
                <div class="chip" data-val="allowed"><span class="chip-icon">👥</span>Разрешены</div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn">💾 Сохранить настройки</button>
    </div>

    <script>
        // Универсальная функция для хранения данных (работает везде)
        function getStorage() {
            // Пробуем использовать Telegram WebApp напрямую
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                try {
                    // Используем user_id как уникальный ключ
                    const userId = window.Telegram.WebApp.initDataUnsafe.user?.id;
                    if (userId) {
                        return {
                            get: function(key) {
                                try {
                                    const fullKey = `living_tales_${userId}_${key}`;
                                    // Пробуем localStorage
                                    if (window.localStorage) {
                                        const val = localStorage.getItem(fullKey);
                                        if (val) return JSON.parse(val);
                                    }
                                    // Пробуем sessionStorage как fallback
                                    if (window.sessionStorage) {
                                        const val = sessionStorage.getItem(fullKey);
                                        if (val) return JSON.parse(val);
                                    }
                                } catch(e) {}
                                return null;
                            },
                            set: function(key, value) {
                                try {
                                    const fullKey = `living_tales_${userId}_${key}`;
                                    if (window.localStorage) {
                                        localStorage.setItem(fullKey, JSON.stringify(value));
                                    }
                                    if (window.sessionStorage) {
                                        sessionStorage.setItem(fullKey, JSON.stringify(value));
                                    }
                                } catch(e) {}
                            }
                        };
                    }
                } catch(e) {}
            }
            
            // Fallback: обычный localStorage с проверкой
            return {
                get: function(key) {
                    try {
                        if (window.localStorage) {
                            const val = localStorage.getItem(key);
                            if (val) return JSON.parse(val);
                        }
                    } catch(e) {}
                    return null;
                },
                set: function(key, value) {
                    try {
                        if (window.localStorage) {
                            localStorage.setItem(key, JSON.stringify(value));
                        }
                    } catch(e) {}
                }
            };
        }

        const tg = window.Telegram.WebApp;
        
        // Инициализация WebApp с задержкой для Samsung
        setTimeout(() => {
            try {
                tg.expand();
                tg.ready();
                if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
                console.log('✅ WebApp инициализирован');
            } catch(e) {
                console.warn('WebApp init error:', e);
            }
        }, 100);
        
        const storage = getStorage();
        
        let settings = {
            initiative: 'balanced',
            length: 'medium',
            pacing: 'normal',
            setting: '',
            npc: 'none'
        };
        
        // Загрузка настроек
        function loadSettings() {
            try {
                // Пробуем загрузить из универсального хранилища
                const saved = storage.get('settings');
                if (saved) {
                    settings = { ...settings, ...saved };
                    console.log('✅ Настройки загружены:', settings);
                } else {
                    console.log('⚠️ Нет сохранённых настроек, используем значения по умолчанию');
                }
            } catch(e) { 
                console.warn('Ошибка загрузки:', e);
            }
        }
        
        // Сохранение в хранилище
        function saveToLocal() {
            try {
                storage.set('settings', settings);
                console.log('💾 Настройки сохранены:', settings);
                return true;
            } catch(e) {
                console.warn('Ошибка сохранения:', e);
                return false;
            }
        }
        
        // Обновление интерфейса
        function updateUI() {
            // Инициатива
            document.querySelectorAll('#initiative-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.initiative) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            // Длина ответов
            document.querySelectorAll('#length-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.length) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            // Темп событий
            document.querySelectorAll('#pacing-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.pacing) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            // NPC
            document.querySelectorAll('#npc-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.npc) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            
            // Текстовое поле
            const textarea = document.getElementById('setting-input');
            if (textarea) {
                textarea.value = settings.setting || '';
            }
        }
        
        // Настройка обработчиков с использованием события touchstart для Samsung
        function setupChips() {
            const groups = ['initiative-group', 'length-group', 'pacing-group', 'npc-group'];
            
            groups.forEach(groupId => {
                const group = document.getElementById(groupId);
                if (!group) return;
                
                group.querySelectorAll('.chip').forEach(chip => {
                    // Удаляем старые обработчики
                    const oldHandler = chip._handler;
                    if (oldHandler) {
                        chip.removeEventListener('click', oldHandler);
                        chip.removeEventListener('touchstart', oldHandler);
                    }
                    
                    const handler = function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        let key = '';
                        if (groupId === 'initiative-group') key = 'initiative';
                        else if (groupId === 'length-group') key = 'length';
                        else if (groupId === 'pacing-group') key = 'pacing';
                        else if (groupId === 'npc-group') key = 'npc';
                        
                        const val = this.getAttribute('data-val');
                        if (key && val && settings[key] !== val) {
                            settings[key] = val;
                            saveToLocal();
                            updateUI();
                            
                            // Вибрация для Android/Samsung
                            if (tg.HapticFeedback) {
                                try {
                                    tg.HapticFeedback.selectionChanged();
                                } catch(e) {}
                            }
                        }
                    };
                    
                    // Добавляем оба события для максимальной совместимости
                    chip.addEventListener('click', handler);
                    chip.addEventListener('touchstart', handler, { passive: false });
                    chip._handler = handler;
                });
            });
        }
        
        // Сохранение и отправка в бот
        function saveAndClose() {
            const textarea = document.getElementById('setting-input');
            if (textarea) {
                settings.setting = textarea.value.trim();
            }
            saveToLocal();
            
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Отправка...';
            btn.disabled = true;
            btn.classList.add('disabled');
            
            try {
                // Отправляем данные в бот
                tg.sendData(JSON.stringify(settings));
                
                // Вибрация при успехе
                if (tg.HapticFeedback) {
                    try {
                        tg.HapticFeedback.notificationOccurred('success');
                    } catch(e) {}
                }
                
                btn.innerHTML = '✅ Отправлено!';
                btn.style.background = '#22c55e';
                
                // Закрываем через полсекунды
                setTimeout(() => {
                    try {
                        tg.close();
                    } catch(e) {
                        console.warn('Close error:', e);
                    }
                }, 500);
            } catch(e) {
                console.error('Ошибка отправки:', e);
                btn.innerHTML = '❌ Ошибка!';
                btn.style.background = '#ef4444';
                
                // Пробуем отправить через альтернативный метод
                try {
                    if (window.parent && window.parent.postMessage) {
                        window.parent.postMessage(JSON.stringify(settings), '*');
                    }
                } catch(e2) {}
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('disabled');
                    btn.style.background = '';
                }, 2000);
            }
        }
        
        // Генерация звёзд
        function createStars() {
            const box = document.getElementById('stars');
            if (!box) return;
            for(let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.animationDelay = Math.random() * 5 + 's';
                box.appendChild(s);
            }
        }
        
        // Инициализация с задержкой для Samsung
        function init() {
            createStars();
            loadSettings();
            updateUI();
            setupChips();
            
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) {
                // Удаляем старые обработчики
                const oldClick = saveBtn._clickHandler;
                if (oldClick) saveBtn.removeEventListener('click', oldClick);
                const oldTouch = saveBtn._touchHandler;
                if (oldTouch) saveBtn.removeEventListener('touchstart', oldTouch);
                
                // Добавляем новые
                const clickHandler = function(e) {
                    e.preventDefault();
                    saveAndClose();
                };
                saveBtn.addEventListener('click', clickHandler);
                saveBtn.addEventListener('touchstart', clickHandler, { passive: false });
                saveBtn._clickHandler = clickHandler;
                saveBtn._touchHandler = clickHandler;
            }
            
            // Логируем успешную инициализацию
            console.log('✅ Mini App полностью инициализирован');
        }
        
        // Запускаем инициализацию после полной загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // Дополнительная задержка для Samsung Internet
        setTimeout(() => {
            if (document.getElementById('stars') && document.getElementById('stars').children.length === 0) {
                createStars();
            }
            if (!document.querySelector('.chip.active')) {
                updateUI();
            }
        }, 500);
    </script>
</body>
</html>
