<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.25);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- ЗВЕЗДНЫЙ ФОН --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        .background-glow {
            position: fixed;
            top: -20%; left: -20%;
            width: 140%; height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 100px;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            margin-top: 15px;
        }
        
        label:first-child { margin-top: 0; }

        .chips-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar { display: none; }

        .chip {
            flex: 1;
            min-width: 80px;
            padding: 12px 10px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            transform: scale(1.02);
        }

        .chip-icon { font-size: 20px; }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
            min-height: 100px;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.7);
        }

        .save-btn-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .main-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container">
        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/></svg>
                Поведение персонажа
            </h2>
            <label>Инициатива в игре</label>
            <div class="chips-container" id="initiative-group">
                <div class="chip" data-val="passive" onclick="pick('initiative','passive',this)">
                    <span class="chip-icon">🌙</span>
                    Пассивный
                </div>
                <div class="chip active" data-val="balanced" onclick="pick('initiative','balanced',this)">
                    <span class="chip-icon">⚖️</span>
                    Баланс
                </div>
                <div class="chip" data-val="active" onclick="pick('initiative','active',this)">
                    <span class="chip-icon">🔥</span>
                    Активный
                </div>
                <div class="chip" data-val="dominant" onclick="pick('initiative','dominant',this)">
                    <span class="chip-icon">👑</span>
                    Доминант
                </div>
            </div>
            <label>Длина ответов</label>
            <div class="chips-container" id="length-group">
                <div class="chip" data-val="short" onclick="pick('length','short',this)">
                    <span class="chip-icon">💬</span>
                    Короткие
                </div>
                <div class="chip active" data-val="medium" onclick="pick('length','medium',this)">
                    <span class="chip-icon">📝</span>
                    Средние
                </div>
                <div class="chip" data-val="long" onclick="pick('length','long',this)">
                    <span class="chip-icon">📜</span>
                    Длинные
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Мир и Сюжет
            </h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" placeholder="Например: Киберпанк 2077, Неон, Дождь... или Фэнтези, Магия, Драконы..."></textarea>
            <label>Темп событий</label>
            <div class="chips-container" id="pacing-group">
                <div class="chip" data-val="slow" onclick="pick('pacing','slow',this)">
                    <span class="chip-icon">🐢</span>
                    Спокойный
                </div>
                <div class="chip active" data-val="normal" onclick="pick('pacing','normal',this)">
                    <span class="chip-icon">🚶</span>
                    Нормальный
                </div>
                <div class="chip" data-val="fast" onclick="pick('pacing','fast',this)">
                    <span class="chip-icon">⚡</span>
                    Экшен
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                Дополнительно
            </h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container" id="npc-group">
                <div class="chip active" data-val="none" onclick="pick('npc','none',this)">
                    <span class="chip-icon">🚫</span>
                    Запрещены
                </div>
                <div class="chip" data-val="allowed" onclick="pick('npc','allowed',this)">
                    <span class="chip-icon">👥</span>
                    Разрешены
                </div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn" onclick="save()">
            <div class="loader" id="loader"></div>
            <span id="btnText">💾 Сохранить настройки</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const STORAGE_KEY = 'lt_settings_v1';
        let data = { initiative:'balanced', length:'medium', pacing:'normal', setting:'', npc:'none' };

        // Загрузка из localStorage
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) data = { ...data, ...JSON.parse(saved) };
            } catch(e) { console.warn('Ошибка загрузки:', e); }
        }

        // Применение настроек к UI
        function applyToUI() {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.querySelectorAll(`.chip[data-val="${data.initiative}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.length}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.pacing}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.npc}"]`).forEach(c => c.classList.add('active'));
            document.getElementById('setting-input').value = data.setting || '';
        }

        // Сохранение в localStorage
        function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        // Генерация звёзд
        function createStars() {
            const box = document.getElementById('stars');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div'); s.className='star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.width = s.style.height = (Math.random()*2+1)+'px';
                s.style.animationDuration = (Math.random()*3+2)+'s';
                s.style.animationDelay = Math.random()*5+'s';
                box.appendChild(s);
            }
        }

        // Обработчик клика
        function pick(key, val, el) {
            data[key] = val;
            el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            saveToStorage();
            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        // Кнопка "Сохранить"
        function save() {
            data.setting = document.getElementById('setting-input').value.trim();
            saveToStorage();
            
            const btn = document.getElementById('saveBtn'), ldr = document.getElementById('loader'), txt = document.getElementById('btnText');
            btn.disabled = true; ldr.style.display='block'; txt.innerText='Отправка...';
            
            try {
                tg.sendData(JSON.stringify(data));
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                btn.style.background='#22c55e'; txt.innerText='✅ Отправлено!';
                setTimeout(() => tg.close(), 800);
            } catch(e) {
                alert('Ошибка: '+e.message);
                btn.disabled=false; ldr.style.display='none'; txt.innerText='💾 Сохранить';
            }
        }

        // Инициализация
        window.onload = () => {
            console.log('🚀 Page loaded');
            createStars();
            loadFromStorage();
            applyToUI();
            tg.ready();
        };
    </script>
</body>
</html>
