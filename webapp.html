<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.3);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --success: #22c55e;
            --danger: #ef4444;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
            --safe-area-top: env(safe-area-inset-top, 0px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            touch-action: pan-y pinch-zoom;
        }

        /* ЗВЁЗДНЫЙ ФОН */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        .background-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 20px;
            padding-bottom: calc(100px + var(--safe-area-bottom));
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            margin-top: 15px;
        }
        
        label:first-child {
            margin-top: 0;
        }

        /* КОНТЕЙНЕР ДЛЯ CHIPS — ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ */
        .chips-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar {
            display: none;
        }

        /* КНОПКИ CHIPS — оптимизированы для iOS */
        .chip {
            flex: 0 0 auto;
            min-width: 85px;
            padding: 12px 8px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            touch-action: manipulation;
        }

        /* Активная кнопка */
        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Визуальный фидбек при нажатии (для iOS) */
        .chip:active {
            transform: scale(0.96);
            background: rgba(168, 85, 247, 0.4);
        }
        .chip.active:active {
            transform: scale(0.96);
        }

        .chip-icon {
            font-size: 22px;
        }

        /* ТЕКСТОВОЕ ПОЛЕ */
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            min-height: 100px;
            -webkit-appearance: none;
            appearance: none;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        /* КНОПКА СОХРАНЕНИЯ (фиксированная внизу) */
        .save-btn-container {
            position: fixed;
            bottom: calc(20px + var(--safe-area-bottom));
            left: 20px;
            right: 20px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
            touch-action: manipulation;
        }

        .main-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
        }

        .main-btn.disabled {
            opacity: 0.7;
            transform: none;
            pointer-events: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container">
        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/></svg>
                Поведение персонажа
            </h2>
            <label>Инициатива в игре</label>
            <div class="chips-container" id="initiative-group">
                <div class="chip" data-val="passive">
                    <span class="chip-icon">🌙</span>
                    Пассивный
                </div>
                <div class="chip active" data-val="balanced">
                    <span class="chip-icon">⚖️</span>
                    Баланс
                </div>
                <div class="chip" data-val="active">
                    <span class="chip-icon">🔥</span>
                    Активный
                </div>
                <div class="chip" data-val="dominant">
                    <span class="chip-icon">👑</span>
                    Доминант
                </div>
            </div>
            <label>Длина ответов</label>
            <div class="chips-container" id="length-group">
                <div class="chip" data-val="short">
                    <span class="chip-icon">💬</span>
                    Короткие
                </div>
                <div class="chip active" data-val="medium">
                    <span class="chip-icon">📝</span>
                    Средние
                </div>
                <div class="chip" data-val="long">
                    <span class="chip-icon">📜</span>
                    Длинные
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Мир и Сюжет
            </h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" placeholder="Например: Киберпанк 2077, Неон, Дождь... или Фэнтези, Магия, Драконы..."></textarea>
            <label>Темп событий</label>
            <div class="chips-container" id="pacing-group">
                <div class="chip" data-val="slow">
                    <span class="chip-icon">🐢</span>
                    Спокойный
                </div>
                <div class="chip active" data-val="normal">
                    <span class="chip-icon">🚶</span>
                    Нормальный
                </div>
                <div class="chip" data-val="fast">
                    <span class="chip-icon">⚡</span>
                    Экшен
                </div>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                Дополнительно
            </h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container" id="npc-group">
                <div class="chip active" data-val="none">
                    <span class="chip-icon">🚫</span>
                    Запрещены
                </div>
                <div class="chip" data-val="allowed">
                    <span class="chip-icon">👥</span>
                    Разрешены
                </div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn">
            <div class="loader" id="loader"></div>
            <span id="btnText">💾 Сохранить настройки</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const STORAGE_KEY = 'lt_settings_v1';
        
        let data = {
            initiative: 'balanced',
            length: 'medium',
            pacing: 'normal',
            setting: '',
            npc: 'none'
        };

        // Загрузка из localStorage
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    data = { ...data, ...parsed };
                }
            } catch(e) {
                console.warn('Ошибка загрузки:', e);
            }
        }

        // Сохранение в localStorage
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Применение настроек к интерфейсу
        function applyToUI() {
            // Активные кнопки
            document.querySelectorAll(`.chip[data-val="${data.initiative}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.length}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.pacing}"]`).forEach(c => c.classList.add('active'));
            document.querySelectorAll(`.chip[data-val="${data.npc}"]`).forEach(c => c.classList.add('active'));
            
            // Текстовое поле
            const settingInput = document.getElementById('setting-input');
            if (settingInput) settingInput.value = data.setting || '';
        }

        // Обработчик клика по кнопке (улучшен для iOS)
        function setupChips() {
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const key = chip.parentElement.id.replace('-group', '');
                    const val = chip.getAttribute('data-val');
                    
                    if (!val) return;
                    
                    // Маппинг ID групп
                    let settingKey = '';
                    if (chip.parentElement.id === 'initiative-group') settingKey = 'initiative';
                    else if (chip.parentElement.id === 'length-group') settingKey = 'length';
                    else if (chip.parentElement.id === 'pacing-group') settingKey = 'pacing';
                    else if (chip.parentElement.id === 'npc-group') settingKey = 'npc';
                    else return;
                    
                    // Обновляем данные
                    data[settingKey] = val;
                    
                    // Обновляем активные классы в этой группе
                    const group = chip.parentElement;
                    const allChips = group.querySelectorAll('.chip');
                    allChips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    
                    // Сохраняем
                    saveToStorage();
                    
                    // Виброотклик
                    if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                });
            });
        }

        // Сохранение и отправка
        async function saveSettings() {
            // Получаем текст из textarea
            const settingInput = document.getElementById('setting-input');
            if (settingInput) {
                data.setting = settingInput.value.trim();
            }
            
            // Сохраняем в localStorage
            saveToStorage();
            
            const btn = document.getElementById('saveBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btn.classList.add('disabled');
            loader.style.display = 'block';
            btnText.innerText = 'Отправка...';
            
            try {
                tg.sendData(JSON.stringify(data));
                
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                btn.style.background = '#22c55e';
                btnText.innerText = '✅ Отправлено!';
                
                setTimeout(() => {
                    tg.close();
                }, 800);
                
            } catch(e) {
                console.error('Ошибка отправки:', e);
                btnText.innerText = '❌ Ошибка! Попробуй ещё';
                btn.style.background = '#ef4444';
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.remove('disabled');
                    loader.style.display = 'none';
                    btnText.innerText = '💾 Сохранить настройки';
                    btn.style.background = '';
                }, 2000);
            }
        }

        // Генерация звёзд
        function createStars() {
            const box = document.getElementById('stars');
            if (!box) return;
            for(let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.animationDelay = Math.random() * 5 + 's';
                box.appendChild(s);
            }
        }

        // Обработка клавиатуры (сдвиг контента)
        function handleKeyboard() {
            const container = document.querySelector('.container');
            if (!container) return;
            
            const inputs = document.querySelectorAll('textarea, input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    setTimeout(() => {
                        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                });
            });
        }

        // Инициализация
        window.onload = () => {
            console.log('🚀 Mini App загружен');
            createStars();
            loadFromStorage();
            applyToUI();
            setupChips();
            handleKeyboard();
            
            // Кнопка сохранения
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', saveSettings);
            }
            
            tg.ready();
        };
    </script>
</body>
</html>
