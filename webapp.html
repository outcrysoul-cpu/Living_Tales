<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.3);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        .background-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 20px;
            padding-bottom: calc(100px + var(--safe-area-bottom));
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            margin-top: 15px;
        }
        
        label:first-child {
            margin-top: 0;
        }

        /* Кнопки в одну линию */
        .chips-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar {
            display: none;
        }

        .chip {
            flex: 0 0 auto;
            min-width: 65px;
            padding: 10px 8px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }

        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .chip-icon {
            font-size: 18px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
            min-height: 100px;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .save-btn-container {
            position: fixed;
            bottom: calc(20px + var(--safe-area-bottom));
            left: 20px;
            right: 20px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
        }

        .main-btn:active {
            transform: scale(0.97);
        }

        .main-btn.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container">
        <div class="card">
            <h2>🎭 Поведение персонажа</h2>
            <label>Инициатива в игре</label>
            <div class="chips-container" id="initiative-group">
                <div class="chip" data-val="passive"><span class="chip-icon">🌙</span>Пассивный</div>
                <div class="chip active" data-val="balanced"><span class="chip-icon">⚖️</span>Баланс</div>
                <div class="chip" data-val="active"><span class="chip-icon">🔥</span>Активный</div>
                <div class="chip" data-val="dominant"><span class="chip-icon">👑</span>Доминант</div>
            </div>
            <label>Длина ответов</label>
            <div class="chips-container" id="length-group">
                <div class="chip" data-val="short"><span class="chip-icon">💬</span>Короткие</div>
                <div class="chip active" data-val="medium"><span class="chip-icon">📝</span>Средние</div>
                <div class="chip" data-val="long"><span class="chip-icon">📜</span>Длинные</div>
            </div>
        </div>

        <div class="card">
            <h2>🌍 Мир и Сюжет</h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" placeholder="Например: Киберпанк 2077, Неон, Дождь... или Фэнтези, Магия, Драконы..."></textarea>
            <label>Темп событий</label>
            <div class="chips-container" id="pacing-group">
                <div class="chip" data-val="slow"><span class="chip-icon">🐢</span>Спокойный</div>
                <div class="chip active" data-val="normal"><span class="chip-icon">🚶</span>Нормальный</div>
                <div class="chip" data-val="fast"><span class="chip-icon">⚡</span>Экшен</div>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ Дополнительно</h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container" id="npc-group">
                <div class="chip active" data-val="none"><span class="chip-icon">🚫</span>Запрещены</div>
                <div class="chip" data-val="allowed"><span class="chip-icon">👥</span>Разрешены</div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn">💾 Сохранить настройки</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
        
        const STORAGE_KEY = 'living_tales_settings';
        
        let settings = {
            initiative: 'balanced',
            length: 'medium',
            pacing: 'normal',
            setting: '',
            npc: 'none'
        };
        
        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    settings = { ...settings, ...JSON.parse(saved) };
                }
            } catch(e) { console.warn(e); }
        }
        
        function saveToLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }
        
        function updateUI() {
            document.querySelectorAll('#initiative-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.initiative) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#length-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.length) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#pacing-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.pacing) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#npc-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.npc) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            
            const textarea = document.getElementById('setting-input');
            if (textarea) textarea.value = settings.setting || '';
        }
        
        function setupChips() {
            const groups = ['initiative-group', 'length-group', 'pacing-group', 'npc-group'];
            
            groups.forEach(groupId => {
                const group = document.getElementById(groupId);
                if (!group) return;
                
                group.querySelectorAll('.chip').forEach(chip => {
                    chip.removeEventListener('click', chip._handler);
                    
                    const handler = function() {
                        let key = '';
                        if (groupId === 'initiative-group') key = 'initiative';
                        else if (groupId === 'length-group') key = 'length';
                        else if (groupId === 'pacing-group') key = 'pacing';
                        else if (groupId === 'npc-group') key = 'npc';
                        
                        const val = this.getAttribute('data-val');
                        if (key && val) {
                            settings[key] = val;
                            saveToLocal();
                            updateUI();
                            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                        }
                    };
                    
                    chip.addEventListener('click', handler);
                    chip._handler = handler;
                });
            });
        }
        
        function saveAndClose() {
            const textarea = document.getElementById('setting-input');
            if (textarea) settings.setting = textarea.value.trim();
            saveToLocal();
            
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Отправка...';
            btn.disabled = true;
            btn.classList.add('disabled');
            
            try {
                tg.sendData(JSON.stringify(settings));
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                btn.innerHTML = '✅ Отправлено!';
                btn.style.background = '#22c55e';
                setTimeout(() => tg.close(), 500);
            } catch(e) {
                console.error(e);
                btn.innerHTML = '❌ Ошибка!';
                btn.style.background = '#ef4444';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('disabled');
                    btn.style.background = '';
                }, 2000);
            }
        }
        
        function createStars() {
            const box = document.getElementById('stars');
            if (!box) return;
            for(let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.animationDelay = Math.random() * 5 + 's';
                box.appendChild(s);
            }
        }
        
        window.onload = () => {
            createStars();
            loadSettings();
            updateUI();
            setupChips();
            
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) saveBtn.addEventListener('click', saveAndClose);
        };
    </script>
</body>
</html>
