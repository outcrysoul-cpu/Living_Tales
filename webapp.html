<style>
    :root {
        --bg-dark: #0f0720;
        --card-bg: rgba(76, 29, 149, 0.25);
        --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
        --accent-glow: #d8b4fe;
        --text-main: #ffffff;
        --text-secondary: #cbd5e1;
    }

    * {
        box-sizing: border-box; /* 🔧 Важно: padding не увеличивает ширину */
    }

    body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        overflow-x: hidden; /* 🔧 Запрещаем горизонтальную прокрутку */
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh;
        position: relative;
        width: 100%; /* 🔧 На всю ширину */
    }

    /* --- ЗВЕЗДНЫЙ ФОН --- */
    .stars-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        overflow: hidden;
    }

    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: twinkle infinite ease-in-out;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
    }

    .background-glow {
        position: fixed;
        top: -20%;
        left: -20%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1) 0%, rgba(15, 7, 32, 0) 70%);
        z-index: -1;
        pointer-events: none;
    }

    .container {
        padding: 15px; /* 🔧 Уменьшили padding для мобильных */
        width: 100%; /* 🔧 На всю ширину */
        max-width: 100%; /* 🔧 Убрали ограничение в 600px */
        margin: 0 auto;
        padding-bottom: 100px;
        position: relative;
        z-index: 1;
    }

    h2 {
        font-size: 16px; /* 🔧 Чуть меньше для мобильных */
        font-weight: 600;
        margin-bottom: 12px;
        margin-top: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--accent-glow);
        text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        flex-wrap: wrap; /* 🔧 Перенос на новую строку если не влезает */
    }

    .card {
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px; /* 🔧 Чуть меньше скругление */
        padding: 16px; /* 🔧 Оптимальный padding */
        margin-bottom: 16px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        width: 100%; /* 🔧 На всю ширину */
    }

    label {
        display: block;
        font-size: 13px; /* 🔧 Чуть меньше */
        color: var(--text-secondary);
        margin-bottom: 10px;
        margin-top: 12px;
        line-height: 1.4;
    }
    
    label:first-child {
        margin-top: 0;
    }

    .chips-container {
        display: flex;
        gap: 8px; /* 🔧 Меньше отступ */
        overflow-x: auto;
        padding-bottom: 5px;
        scrollbar-width: none;
        width: 100%; /* 🔧 На всю ширину */
    }
    .chips-container::-webkit-scrollbar { display: none; }

    .chip {
        flex: 1; /* 🔧 Растягиваем равномерно */
        min-width: 70px; /* 🔧 Минимальная ширина */
        padding: 10px 8px; /* 🔧 Оптимальный padding */
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        font-size: 12px; /* 🔧 Читаемый размер */
        font-weight: 500;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        white-space: nowrap; /* 🔧 Не переносить текст */
    }

    .chip.active {
        background: var(--primary-gradient);
        color: white;
        border-color: transparent;
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        transform: scale(1.02);
    }

    .chip-icon {
        font-size: 18px; /* 🔧 Иконки поменьше */
    }

    textarea, input[type="text"] {
        width: 100%; /* 🔧 На всю ширину */
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 12px;
        color: white;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s;
    }

    textarea:focus, input[type="text"]:focus {
        border-color: #a855f7;
        box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        background: rgba(0, 0, 0, 0.7);
    }

    textarea {
        min-height: 80px; /* 🔧 Чуть меньше высота */
    }

    .save-btn-container {
        position: fixed;
        bottom: 15px;
        left: 15px;
        right: 15px; /* 🔧 Фиксированные отступы */
        max-width: calc(100% - 30px); /* 🔧 Не шире экрана */
        margin: 0 auto;
        z-index: 100;
    }

    .main-btn {
        width: 100%; /* 🔧 На всю ширину контейнера */
        padding: 14px; /* 🔧 Оптимальная высота */
        border-radius: 18px;
        border: none;
        background: var(--primary-gradient);
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .main-btn:active {
        transform: scale(0.98);
        box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
    }

    .loader {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .icon-svg {
        width: 22px; /* 🔧 Иконки поменьше */
        height: 22px;
        fill: currentColor;
        flex-shrink: 0; /* 🔧 Не сжимать */
    }

    /* 🔧 Адаптация для очень маленьких экранов */
    @media (max-width: 360px) {
        .container {
            padding: 12px;
        }
        .card {
            padding: 14px;
        }
        .chip {
            font-size: 11px;
            padding: 8px 6px;
        }
        h2 {
            font-size: 15px;
        }
    }
</style>
