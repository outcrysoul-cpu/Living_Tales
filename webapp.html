<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.3);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- ЗВЕЗДНЫЙ ФОН --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        .background-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 16px;
            padding-bottom: 100px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-top: 14px;
        }
        
        label:first-of-type {
            margin-top: 0;
        }

        /* Чипсы — адаптивные */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 0 -2px;
        }

        .chip {
            flex: 1 1 auto;
            min-width: 70px;
            padding: 10px 8px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* На маленьких экранах — переносим текст */
        @media (max-width: 450px) {
            .chip {
                white-space: normal;
                word-break: keep-all;
                min-width: 65px;
                padding: 8px 6px;
            }
            .chip .chip-icon {
                font-size: 18px;
            }
        }

        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
        }

        .chip-icon {
            font-size: 20px;
        }

        /* Текстовое поле */
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            min-height: 90px;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        /* Фиксированная кнопка сохранения */
        .save-btn-container {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            max-width: 568px;
            margin: 0 auto;
            z-index: 100;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
            touch-action: manipulation;
        }

        .main-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .icon-svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container">
        <!-- Поведение персонажа -->
        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/></svg>
                Поведение персонажа
            </h2>
            <label>Инициатива в игре</label>
            <div class="chips-container">
                <div class="chip" data-key="initiative" data-val="passive">
                    <span class="chip-icon">🌙</span>
                    Пассивный
                </div>
                <div class="chip" data-key="initiative" data-val="balanced">
                    <span class="chip-icon">⚖️</span>
                    Баланс
                </div>
                <div class="chip" data-key="initiative" data-val="active">
                    <span class="chip-icon">🔥</span>
                    Активный
                </div>
                <div class="chip" data-key="initiative" data-val="dominant">
                    <span class="chip-icon">👑</span>
                    Доминант
                </div>
            </div>

            <label>Длина ответов</label>
            <div class="chips-container">
                <div class="chip" data-key="length" data-val="short">
                    <span class="chip-icon">💬</span>
                    Короткие
                </div>
                <div class="chip" data-key="length" data-val="medium">
                    <span class="chip-icon">📝</span>
                    Средние
                </div>
                <div class="chip" data-key="length" data-val="long">
                    <span class="chip-icon">📜</span>
                    Длинные
                </div>
            </div>
        </div>

        <!-- Мир и Сюжет -->
        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Мир и Сюжет
            </h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" rows="2" placeholder="Пример: Киберпанк 2077, неон, дождь... или Фэнтези, магия, драконы..."></textarea>

            <label>Темп событий</label>
            <div class="chips-container">
                <div class="chip" data-key="pacing" data-val="slow">
                    <span class="chip-icon">🐢</span>
                    Спокойный
                </div>
                <div class="chip" data-key="pacing" data-val="normal">
                    <span class="chip-icon">🚶</span>
                    Нормальный
                </div>
                <div class="chip" data-key="pacing" data-val="fast">
                    <span class="chip-icon">⚡</span>
                    Экшен
                </div>
            </div>
        </div>

        <!-- Дополнительно -->
        <div class="card">
            <h2>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                Дополнительно
            </h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container">
                <div class="chip" data-key="npc" data-val="none">
                    <span class="chip-icon">🚫</span>
                    Запрещены
                </div>
                <div class="chip" data-key="npc" data-val="allowed">
                    <span class="chip-icon">👥</span>
                    Разрешены
                </div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn">
            <div class="loader" id="loader"></div>
            <span id="btnText">💾 Сохранить настройки</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation(); // предупреждение при закрытии

        // Ключ для localStorage
        const STORAGE_KEY = 'living_tales_settings';
        
        // Данные по умолчанию
        let userSettings = {
            initiative: 'balanced',
            length: 'medium',
            pacing: 'normal',
            setting: '',
            npc: 'none'
        };

        // Загрузка из localStorage
        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    userSettings = { ...userSettings, ...parsed };
                    console.log('📦 Загружены настройки:', userSettings);
                } else {
                    console.log('🆕 Настроек нет, используем значения по умолчанию');
                }
            } catch(e) {
                console.warn('Ошибка загрузки:', e);
            }
        }

        // Применение настроек к интерфейсу
        function applySettingsToUI() {
            // Чипсы
            document.querySelectorAll('.chip').forEach(chip => {
                const key = chip.getAttribute('data-key');
                const val = chip.getAttribute('data-val');
                if (userSettings[key] === val) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
            
            // Текстовое поле
            const settingField = document.getElementById('setting-input');
            if (settingField) {
                settingField.value = userSettings.setting || '';
            }
        }

        // Сохранение в localStorage
        function persistSettings() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userSettings));
        }

        // Обработчик выбора чипса
        function handleChipClick(event) {
            const chip = event.currentTarget;
            const key = chip.getAttribute('data-key');
            const val = chip.getAttribute('data-val');
            
            if (!key || !val) return;
            
            // Обновляем данные
            userSettings[key] = val;
            
            // Обновляем UI: активируем только текущий чипс в группе
            const container = chip.parentElement;
            const chips = container.querySelectorAll('.chip');
            chips.forEach(c => {
                if (c.getAttribute('data-key') === key) {
                    if (c.getAttribute('data-val') === val) {
                        c.classList.add('active');
                    } else {
                        c.classList.remove('active');
                    }
                }
            });
            
            // Сохраняем в localStorage
            persistSettings();
            
            // Виброотклик
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        // Привязка обработчиков к чипсам
        function bindChipEvents() {
            document.querySelectorAll('.chip').forEach(chip => {
                chip.removeEventListener('click', handleChipClick);
                chip.addEventListener('click', handleChipClick);
            });
        }

        // Сохранение и отправка в бот
        function saveAndSend() {
            // Считываем сеттинг из текстового поля
            const settingInput = document.getElementById('setting-input');
            userSettings.setting = settingInput.value.trim();
            
            // Обновляем localStorage
            persistSettings();
            
            const btn = document.getElementById('saveBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Отправка...';
            
            try {
                // Отправляем данные в бот
                tg.sendData(JSON.stringify(userSettings));
                
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                btn.style.background = '#22c55e';
                btnText.innerText = '✅ Отправлено!';
                
                setTimeout(() => {
                    tg.close();
                }, 800);
            } catch(e) {
                console.error('Ошибка отправки:', e);
                alert('Ошибка: ' + e.message);
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = '💾 Сохранить настройки';
                btn.style.background = '';
            }
        }

        // Генерация звёзд
        function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            container.innerHTML = '';
            const starCount = Math.min(80, Math.floor(window.innerWidth / 8));
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = Math.random() * 4 + 2 + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // Инициализация
        window.onload = () => {
            console.log('🚀 Mini App загружен');
            createStars();
            loadSettings();
            applySettingsToUI();
            bindChipEvents();
            
            // Кнопка сохранения
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) {
                saveBtn.removeEventListener('click', saveAndSend);
                saveBtn.addEventListener('click', saveAndSend);
            }
            
            tg.ready();
        };
        
        // При изменении размера окна — пересоздаём звёзды (опционально)
        window.addEventListener('resize', () => {
            createStars();
        });
    </script>
</body>
</html>
