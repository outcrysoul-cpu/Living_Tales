<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Living Tales Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0720;
            --card-bg: rgba(76, 29, 149, 0.3);
            --primary-gradient: linear-gradient(135deg, #a855f7 0%, #4c1d95 100%);
            --accent-glow: #d8b4fe;
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
        }

        .background-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, rgba(15, 7, 32, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* КРАСИВЫЙ ЗАГОЛОВОК */
        .title-wrapper {
            text-align: center;
            margin-bottom: 24px;
            margin-top: 8px;
            position: relative;
        }
        
        .title {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5e6d3 0%, #d8b4fe 50%, #a855f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s ease infinite;
            letter-spacing: 2px;
            font-style: italic;
            display: inline-block;
            position: relative;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        
        @keyframes shimmer {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        
        /* КНИЖЕЧКА — ТЕПЕРЬ НОРМАЛЬНАЯ, БЕЗ БЛЮРА */
        .book-icon {
            display: inline-block;
            font-size: 34px;
            margin-left: 8px;
            filter: drop-shadow(0 0 3px rgba(168, 85, 247, 0.4));
            vertical-align: middle;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #d8b4fe;
            animation: none;
        }
        
        .title-sub {
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-top: 6px;
            opacity: 0.75;
            font-style: italic;
            font-weight: 400;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.3s ease;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(168, 85, 247, 0.2);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--accent-glow);
            font-size: 16px;
            font-weight: 500;
        }
        
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .container {
            padding: 16px;
            padding-bottom: calc(100px + var(--safe-area-bottom));
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container.visible {
            opacity: 1;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-top: 12px;
        }
        
        label:first-child {
            margin-top: 0;
        }

        .chips-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            justify-content: center;
        }
        
        .chips-container.scrollable {
            justify-content: flex-start;
        }
        
        .chips-container::-webkit-scrollbar {
            height: 3px;
        }
        .chips-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .chips-container::-webkit-scrollbar-thumb {
            background: var(--accent-glow);
            border-radius: 3px;
        }

        .chip {
            flex: 0 0 auto;
            min-width: 68px;
            padding: 10px 8px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            white-space: nowrap;
        }
        
        .chip.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        
        .chip:active {
            transform: scale(0.96);
            background: rgba(168, 85, 247, 0.5);
        }

        .chip-icon {
            font-size: 16px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
            min-height: 90px;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .save-btn-container {
            position: fixed;
            bottom: calc(20px + var(--safe-area-bottom));
            left: 20px;
            right: 20px;
            max-width: 560px;
            margin: 0 auto;
            z-index: 100;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.5);
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: auto;
        }

        .main-btn:active {
            transform: scale(0.97);
        }

        .main-btn.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .card:last-child {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка настроек...</div>
    </div>

    <div class="stars-container" id="stars"></div>
    <div class="background-glow"></div>

    <div class="container" id="mainContainer">
        <!-- КРАСИВЫЙ ЗАГОЛОВОК -->
        <div class="title-wrapper">
            <div class="title">
                Living Tales
                <span class="book-icon">📖</span>
            </div>
            <div class="title-sub">где истории оживают</div>
        </div>

        <div class="card">
            <h2>🎭 Поведение персонажа</h2>
            <label>Инициатива в игре</label>
            <div class="chips-container scrollable" id="initiative-group">
                <div class="chip" data-val="passive"><span class="chip-icon">🌙</span>Пассивный</div>
                <div class="chip" data-val="balanced"><span class="chip-icon">⚖️</span>Баланс</div>
                <div class="chip" data-val="active"><span class="chip-icon">🔥</span>Активный</div>
                <div class="chip" data-val="dominant"><span class="chip-icon">👑</span>Доминант</div>
            </div>
            <label>Длина ответов</label>
            <div class="chips-container" id="length-group">
                <div class="chip" data-val="short"><span class="chip-icon">💬</span>Короткие</div>
                <div class="chip" data-val="medium"><span class="chip-icon">📝</span>Средние</div>
                <div class="chip" data-val="long"><span class="chip-icon">📜</span>Длинные</div>
            </div>
        </div>

        <div class="card">
            <h2>🌍 Мир и Сюжет</h2>
            <label>Сеттинг (Место действия)</label>
            <textarea id="setting-input" placeholder="Например: Киберпанк 2077, Неон, Дождь... или Фэнтези, Магия, Драконы..."></textarea>
            <label>Темп событий</label>
            <div class="chips-container" id="pacing-group">
                <div class="chip" data-val="slow"><span class="chip-icon">🐢</span>Спокойный</div>
                <div class="chip" data-val="normal"><span class="chip-icon">🚶</span>Нормальный</div>
                <div class="chip" data-val="fast"><span class="chip-icon">⚡</span>Экшен</div>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ Дополнительно</h2>
            <label>Второстепенные персонажи (NPC)</label>
            <div class="chips-container" id="npc-group">
                <div class="chip" data-val="none"><span class="chip-icon">🚫</span>Запрещены</div>
                <div class="chip" data-val="allowed"><span class="chip-icon">👥</span>Разрешены</div>
            </div>
        </div>
    </div>

    <div class="save-btn-container">
        <button class="main-btn" id="saveBtn">💾 Сохранить настройки</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        try {
            tg.expand();
            tg.ready();
            if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
            
            if (tg.setBackgroundColor) tg.setBackgroundColor('#0f0720');
            if (tg.setHeaderColor) tg.setHeaderColor('bg_color');
            
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
            document.body.style.height = '100%';
            
            const container = document.getElementById('mainContainer');
            if (container) {
                container.style.overflowY = 'auto';
                container.style.height = '100vh';
                container.style.position = 'relative';
                container.style.webkitOverflowScrolling = 'touch';
            }
        } catch(e) {
            console.warn('Telegram WebApp error:', e);
        }
        
        const STORAGE_KEY = 'living_tales_settings';
        
        let settings = {
            initiative: 'balanced',
            length: 'medium',
            pacing: 'normal',
            setting: '',
            npc: 'none'
        };
        
        function createStars() {
            const box = document.getElementById('stars');
            if (!box) return;
            box.innerHTML = '';
            const starCount = 250;
            
            for(let i = 0; i < starCount; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2.5 + 0.5;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.opacity = Math.random() * 0.6 + 0.2;
                box.appendChild(s);
            }
        }
        
        function loadFromTelegram() {
            return new Promise((resolve) => {
                try {
                    if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                        try {
                            const decoded = decodeURIComponent(tg.initDataUnsafe.start_param);
                            const botData = JSON.parse(decoded);
                            if (botData && typeof botData === 'object') {
                                console.log('📥 Получены данные от бота:', botData);
                                settings = { ...settings, ...botData };
                                saveToLocal();
                                resolve(true);
                                return;
                            }
                        } catch(e) {
                            console.warn('Не удалось распарсить start_param:', e);
                        }
                    }
                    
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        settings = { ...settings, ...parsed };
                        console.log('💾 Загружено из localStorage:', settings);
                        resolve(true);
                        return;
                    }
                    
                    console.log('⚠️ Нет данных, используем значения по умолчанию');
                    resolve(true);
                } catch(e) {
                    console.error('Ошибка загрузки:', e);
                    resolve(false);
                }
            });
        }
        
        function saveToLocal() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
                return true;
            } catch(e) {
                console.error('Ошибка сохранения в localStorage:', e);
                return false;
            }
        }
        
        function updateUI() {
            document.querySelectorAll('#initiative-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.initiative) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#length-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.length) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#pacing-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.pacing) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('#npc-group .chip').forEach(chip => {
                if (chip.getAttribute('data-val') === settings.npc) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            
            const textarea = document.getElementById('setting-input');
            if (textarea) {
                textarea.value = settings.setting || '';
            }
        }
        
        function setupChips() {
            const groups = ['initiative-group', 'length-group', 'pacing-group', 'npc-group'];
            
            groups.forEach(groupId => {
                const group = document.getElementById(groupId);
                if (!group) return;
                
                group.querySelectorAll('.chip').forEach(chip => {
                    const oldHandler = chip._handler;
                    if (oldHandler) chip.removeEventListener('click', oldHandler);
                    if (oldHandler) chip.removeEventListener('touchstart', oldHandler);
                    
                    const handler = function(e) {
                        e.stopPropagation();
                        
                        let key = '';
                        if (groupId === 'initiative-group') key = 'initiative';
                        else if (groupId === 'length-group') key = 'length';
                        else if (groupId === 'pacing-group') key = 'pacing';
                        else if (groupId === 'npc-group') key = 'npc';
                        
                        const val = this.getAttribute('data-val');
                        if (key && val && settings[key] !== val) {
                            settings[key] = val;
                            saveToLocal();
                            updateUI();
                            
                            try {
                                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                            } catch(e) {}
                        }
                    };
                    
                    chip.addEventListener('click', handler);
                    chip.addEventListener('touchstart', handler, { passive: false });
                    chip._handler = handler;
                });
            });
        }
        
        function saveAndClose() {
            const textarea = document.getElementById('setting-input');
            if (textarea) {
                settings.setting = textarea.value.trim();
            }
            saveToLocal();
            
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Отправка...';
            btn.disabled = true;
            btn.classList.add('disabled');
            
            try {
                tg.sendData(JSON.stringify(settings));
                
                try {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } catch(e) {}
                
                btn.innerHTML = '✅ Отправлено!';
                btn.style.background = '#22c55e';
                
                setTimeout(() => {
                    try {
                        tg.close();
                    } catch(e) {
                        console.warn('Не удалось закрыть:', e);
                    }
                }, 500);
            } catch(e) {
                console.error('Ошибка отправки:', e);
                btn.innerHTML = '❌ Ошибка!';
                btn.style.background = '#ef4444';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('disabled');
                    btn.style.background = '';
                }, 2000);
            }
        }
        
        async function init() {
            console.log('🚀 Mini App инициализация...');
            
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContainer = document.getElementById('mainContainer');
            
            createStars();
            await loadFromTelegram();
            updateUI();
            setupChips();
            
            const textarea = document.getElementById('setting-input');
            if (textarea) {
                textarea.addEventListener('input', function() {
                    settings.setting = this.value.trim();
                    saveToLocal();
                });
            }
            
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', saveAndClose);
                saveBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    saveAndClose();
                }, { passive: false });
            }
            
            setTimeout(() => {
                loadingScreen.classList.add('hide');
                mainContainer.classList.add('visible');
                setTimeout(() => {
                    if (loadingScreen.parentNode) {
                        loadingScreen.style.display = 'none';
                    }
                }, 300);
            }, 300);
        }
        
        window.onload = init;
    </script>
</body>
</html>
